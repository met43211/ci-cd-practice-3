services:
  web:
    build:
      context: ./flask_app
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-appsecret}@postgres:5432/${POSTGRES_DB:-appdb}
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_APP_USER:-appmysql}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-appmysqlsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdata}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-appdata}
      MARIADB_USER: ${MYSQL_APP_USER:-appmysql}
      MARIADB_PASSWORD: ${MYSQL_APP_PASSWORD:-appmysqlsecret}
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  mysqldata:
  redisdata:
